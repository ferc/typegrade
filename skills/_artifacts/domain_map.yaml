library:
  name: typegrade
  version: "0.9.0"
  repository: ferc/typegrade
  description: TypeScript type-safety and precision analyzer for the AI agent era

domains:
  - name: analysis
    description: >
      Core analysis workflows — local project analysis (source mode, 12 dimensions)
      and published package scoring (package mode, 8 consumer dimensions).
    subsystems:
      - analyzer (src/analyzer.ts)
      - package-scorer (src/package-scorer.ts)
      - surface sampler (src/surface/)
      - declaration graph (src/graph/)
    skills:
      - analyze-project
      - score-package

  - name: comparison
    description: >
      Side-by-side evaluation of two packages on global scores, domain fit,
      and confidence.
    subsystems:
      - compare (src/compare.ts)
    skills:
      - compare-packages

  - name: ci-integration
    description: >
      CI gating, JSON output consumption, diff analysis, and automation workflows.
    subsystems:
      - cli (src/cli.ts)
      - format (src/utils/format.ts)
      - diff (src/diff.ts)
    skills:
      - quality-gate
      - consume-json

  - name: self-improvement
    description: >
      Closed-loop self-analysis with agent-oriented output, fix batches,
      fix planning, fix application, and iterative improvement.
    subsystems:
      - agent (src/agent/)
      - ownership (src/ownership/)
      - suppression (src/suppression/)
      - fix planner (src/fix/planner.ts)
      - fix applier (src/fix/applier.ts)
      - boundaries (src/boundaries/)
    skills:
      - self-analyze

  - name: maintainer
    description: >
      Skill maintenance, Intent validation, and freshness tracking.
    skills:
      - maintain-skills

failure_modes:
  - id: low-confidence-overreaction
    description: >
      Agent treats a low-confidence score as definitive and makes sweeping
      changes. Scores with confidence below 0.5 are indicative only.
    skills: [analyze-project, score-package, consume-json]

  - id: package-vs-source-confusion
    description: >
      Agent compares a package-mode score (8 dimensions) with a source-mode
      score (12 dimensions) as if they are equivalent. They are not.
    skills: [analyze-project, score-package, compare-packages]

  - id: cross-domain-comparison
    description: >
      Agent compares domain-fit scores across different domains. Domain
      scores are only comparable within the same domain.
    skills: [compare-packages, consume-json]

  - id: undersampled-trust
    description: >
      Agent trusts a high score from an undersampled package. Packages with
      very few public declarations produce unreliable scores.
    skills: [score-package, consume-json, quality-gate]

  - id: scenario-misapplication
    description: >
      Agent uses scenario scores from one domain to judge another domain.
      Scenario scores are domain-specific.
    skills: [consume-json, score-package]
